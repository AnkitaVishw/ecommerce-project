{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<h2>Welcome Back 👋</h2>

<form method="POST">
    {% csrf_token %}

    <p>
        <label>Username</label>
        <input
            type="text"
            name="username"
            placeholder="Enter username"
            required
        >
    </p>

    <p>
        <label>Password</label>
        <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
        >
    </p>

    <button type="submit">
        Login
    </button>
</form>

<p style="text-align:center;margin-top:20px;">
    Don't have an account?
    <a href="{% url 'register' %}">
        Register
    </a>
</p>

{% endblock %}
